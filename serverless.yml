service: analytics-tracker
frameworkVersion: '^4.0.0'

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap:
      type: linked
      setNodeOptions: true
    external:
      - '@aws-sdk/*'
    buildConcurrency: 3

package:
  individually: false
  patterns:
    - '!.git/**'
    - '!.webpack/**'
    - '!node_modules/**'
    - '!cdk/**'
    - '!*.test.ts'
    - '!.gitlab-ci.yml'

plugins:
  - serverless-offline

custom:
  currentStage: ${opt:stage, self:provider.stage}
  serverless-offline:
    resourceRoutes: true
    useSeparateProcesses: true
    httpPort: 4000
    host: 0.0.0.0
    noPrependStageInUrl: true
    # Enhanced v4 features for local development
    lambdaPort: 4002 # ! Internal port used by serverless-offline's Lambda runtime; reserver for serverless, set here to 4002 otherwise it will default to 3002.
    reloadHandler: true
    useChildProcesses: true
    printOutput: true
    noTimeout: false

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${file(./src/js-helpers/set-stage.js):setStage}
  httpApi:
    shouldStartNameWithService: true
    payload: '2.0'
    cors: true
  logs:
    lambda:
      logFormat: JSON
      applicationLogLevel: INFO
      systemLogLevel: INFO
functions: ${file(./src/js-helpers/load-services.js):functions}
resources:
  Resources:
    PaypalServiceProxyResource:
      Type: AWS::ApiGateway::Resource
      Properties:
        ParentId:
          Fn::GetAtt:
            - ApiGatewayRestApi # our default Rest API logical ID
            - RootResourceId
        PathPart: '{proxy+}' # the endpoint in your API that is set as proxy
        RestApiId:
          Ref: ApiGatewayRestApi
